<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サイト名</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ヒーローセクション（背景画像） -->
  <section class="hero">
    <img src="images/panda_face.png" alt="パンダ" class="panda-bg">
    <div class="hero-image-wrapper">
      <img src="images/m_face.jpg" alt="メイン画像">
    </div>
  </section>

  <!-- NAMEセクション -->
  <section class="name-section">
    <h1 class="site-name">高野 真人さん</h1>
    <p>今日はご参列いただきありがとうございます！<br>日頃の感謝をこめて、少しでも楽しんでいただけたら幸いです。</p>
  </section>

  <!-- Header1セクション -->
  <section class="content-section">
    <h2>あなたの印象</h2>
    <p>優しくて、テンションが一定。<br>でも面白いこととか下ネタをがんがん言う！</p>
  </section>

  <!-- Header2セクション -->
  <section class="content-section">
    <h2>あなたを動物に例えると？</h2>
    <p>パンダ！<br>理由：かわいくて、のんびりしてて癒し系♡</p>
  </section>

  <!-- Header3セクション -->
  <section class="content-section">
    <h2>私からのメッセージ</h2>
    <p>いつも私のやりたいことにたくさん<br>つきあってくれてありがとう！<br>真人さんのお嫁さんになれて幸せです。<br>
      おじいちゃんおばあちゃんになっても<br>ずーと仲良しでいようね！</p>
  </section>

  <!-- ボトム画像セクション -->
  <section class="bottom-image-section">
    <img src="images/bottom-image.jpg" alt="ボトム画像">
  </section>

</body>
</html>
